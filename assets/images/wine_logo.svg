<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Garrafa de vinho -->
  <g id="bottle">
    <!-- Gargalo -->
    <rect x="85" y="20" width="30" height="30" fill="#2d5016" rx="2"/>
    <!-- Rolha -->
    <rect x="82" y="12" width="36" height="10" fill="#c4a747" rx="2"/>
    <!-- Corpo principal da garrafa -->
    <path d="M 80 50 Q 70 70 70 100 L 70 180 Q 70 200 85 210 L 115 210 Q 130 200 130 180 L 130 100 Q 130 70 120 50 Z" 
          fill="#1a3a0f" stroke="#0d1f08" stroke-width="1.5"/>
    <!-- Reflexo na garrafa (mais claro) -->
    <ellipse cx="85" cy="90" rx="8" ry="20" fill="#2d5016" opacity="0.6"/>
    <!-- Base da garrafa -->
    <ellipse cx="97.5" cy="210" rx="15" ry="6" fill="#0d1f08"/>
  </g>
  
  <!-- Vinho dentro da garrafa -->
  <path d="M 72 140 L 72 180 Q 72 198 85 208 L 110 208 Q 123 198 123 180 L 123 140 Z" 
        fill="#722f37" opacity="0.9"/>
  
  <!-- Reflexo do vinho -->
  <ellipse cx="80" cy="160" rx="6" ry="15" fill="#8b3a47" opacity="0.5"/>
  
  <!-- Uva decorativa ao lado -->
  <g id="grapes">
    <!-- Cacho de uvas -->
    <circle cx="50" cy="100" r="8" fill="#722f37"/>
    <circle cx="42" cy="110" r="7" fill="#722f37"/>
    <circle cx="58" cy="110" r="7" fill="#722f37"/>
    <circle cx="45" cy="122" r="6" fill="#722f37"/>
    <circle cx="55" cy="122" r="6" fill="#722f37"/>
    <circle cx="50" cy="132" r="5" fill="#722f37"/>
    
    <!-- Folha -->
    <ellipse cx="60" cy="85" rx="12" ry="8" fill="#2d5016" transform="rotate(-30 60 85)"/>
  </g>
  
  <!-- Texto decorativo -->
  <text x="100" y="260" font-size="20" font-weight="bold" text-anchor="middle" fill="#722f37" 
        font-family="serif">Cartas de Vinhos</text>
</svg>