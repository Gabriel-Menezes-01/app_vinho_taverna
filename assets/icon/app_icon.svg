    <circle cx="158" cy="538" r="8" fill="#8B1538"/>
    <circle cx="171" cy="545" r="8" fill="#8B1538"/>
    <circle cx="232" cy="545" r="8" fill="#8B1538"/>
    <circle cx="245" cy="538" r="8" fill="#8B1538"/>
    <circle cx="258" cy="545" r="8" fill="#8B1538"/>
