    <path d="M 100 200 Q 80 220 80 250 L 80 700 Q 80 750 120 750 L 280 750 Q 320 750 320 700 L 320 250 Q 320 220 300 200 Z" 
          fill="#8B1538" stroke="#FFF" stroke-width="8"/>
    
    <!-- Gargalo -->
